<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduManage ERP - Faculty Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-bright": "#f9f9ff",
          "surface-container-low": "#f1f3ff",
          "surface-container": "#e9edff",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#c4c6cf",
          "outline": "#74777f",
          "on-surface-variant": "#43474e",
          "on-surface": "#141b2b",
          "primary": "#022448",
          "on-primary": "#ffffff",
          "primary-container": "#1e3a5f",
          "on-primary-container": "#8aa4cf",
          "on-primary-fixed-variant": "#2d486d",
          "secondary": "#0051d5",
          "error": "#ba1a1a"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { background-color: #f9f9ff; font-family: 'Inter', sans-serif; }
  .zebra-row:nth-child(even) { background-color: #EFF6FF; }
</style>
</head>
<body class="text-on-surface">

<aside class="flex flex-col h-screen fixed left-0 top-0 py-6 px-4 bg-primary w-64 z-50">
  <div class="mb-10 px-2">
    <h1 class="text-lg font-bold text-white">EduManage ERP</h1>
    <p class="text-xs text-on-primary-container opacity-70 uppercase tracking-widest mt-1">Admin Portal</p>
  </div>
  <nav class="flex-1 space-y-1">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../admin_dashboard_edumanage_erp/code.html">
      <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../manage_students_edumanage_erp/code.html">
      <span class="material-symbols-outlined">school</span><span>Students</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-container bg-primary-container rounded-lg font-bold" href="#">
      <span class="material-symbols-outlined">badge</span><span>Faculty</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../fee_management_edumanage_erp/code.html">
      <span class="material-symbols-outlined">payments</span><span>Fees</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../mark_attendance_faculty_portal/code.html">
      <span class="material-symbols-outlined">calendar_today</span><span>Attendance</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../enter_marks_faculty_portal/code.html">
      <span class="material-symbols-outlined">grade</span><span>Marks</span>
    </a>
  </nav>
  <div class="mt-auto border-t border-white/10 pt-4">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors cursor-pointer" onclick="logout()">
      <span class="material-symbols-outlined">logout</span><span>Logout</span>
    </a>
  </div>
</aside>

<main class="ml-64 min-h-screen">
  <header class="flex justify-between items-center w-full px-6 h-16 sticky top-0 bg-surface-bright border-b border-outline-variant z-40">
    <h2 class="text-xl font-bold text-primary">Faculty Management</h2>
    <button onclick="openAddModal()" class="bg-primary text-white px-6 py-2 rounded-lg font-semibold flex items-center gap-2 hover:opacity-90">
      <span class="material-symbols-outlined">add</span> Add Faculty
    </button>
  </header>

  <div class="p-6 max-w-[1280px]">
    <div class="mb-4 relative w-full max-w-md">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
      <input class="w-full pl-10 pr-4 py-2 bg-white border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20"
             placeholder="Search faculty..." type="text" id="search-input" oninput="searchFaculty()"/>
    </div>

    <div class="bg-white rounded-xl border border-outline-variant overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-primary text-white">
            <tr>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Name</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Employee Code</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Department</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase">Designation</th>
              <th class="px-6 py-3 text-xs font-semibold uppercase text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="faculty-table">
            <tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant">Loading faculty...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Add Faculty Modal -->
<div id="add-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center">
  <div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
    <h3 class="text-lg font-bold text-primary mb-4">Add New Faculty</h3>
    <div id="modal-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm"></div>
    <div class="space-y-3">
      <input id="f-name" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Full Name" type="text"/>
      <input id="f-email" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Email" type="email"/>
      <input id="f-password" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Password" type="password"/>
      <input id="f-code" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Employee Code" type="text"/>
      <input id="f-phone" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Phone (optional)" type="text"/>
      <input id="f-designation" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Designation (e.g. Professor)" type="text"/>
      <select id="f-department" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20">
        <option value="">Select Department</option>
      </select>
      <input id="f-joining" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Joining Date" type="date"/>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="closeAddModal()" class="flex-1 px-4 py-2 border border-outline-variant rounded-lg text-sm font-semibold hover:bg-surface-container-low">Cancel</button>
      <button onclick="addFaculty()" id="add-btn" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg text-sm font-semibold hover:opacity-90">Add Faculty</button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://student-erp-backend-v7f3.onrender.com';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '../login_edumanage_erp/code.html';

  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  let allFaculty = [];

  async function loadFaculty() {
    try {
      const res = await fetch(`${API_URL}/api/faculty`, { headers });
      allFaculty = await res.json();
      renderFaculty(allFaculty);
    } catch (err) {
      document.getElementById('faculty-table').innerHTML =
        '<tr><td colspan="5" class="px-6 py-8 text-center text-error">Failed to load faculty</td></tr>';
    }
  }

  function renderFaculty(faculty) {
    const tbody = document.getElementById('faculty-table');
    if (!faculty.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-on-surface-variant">No faculty found</td></tr>';
      return;
    }
    tbody.innerHTML = faculty.map(f => `
      <tr class="zebra-row border-b border-outline-variant/30 hover:bg-primary/5 transition-colors">
        <td class="px-6 py-3">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-primary font-bold text-xs">
              ${(f.users?.full_name || 'NA').split(' ').map(n=>n[0]).join('').slice(0,2)}
            </div>
            <div>
              <p class="font-bold text-primary">${f.users?.full_name || 'N/A'}</p>
              <p class="text-xs text-on-surface-variant">${f.users?.email || ''}</p>
            </div>
          </div>
        </td>
        <td class="px-6 py-3 font-mono text-on-surface-variant">${f.employee_code}</td>
        <td class="px-6 py-3">${f.departments?.name || 'N/A'}</td>
        <td class="px-6 py-3">${f.designation || 'N/A'}</td>
        <td class="px-6 py-3 text-right">
          <button onclick="deleteFaculty('${f.id}')" class="p-1.5 text-error hover:bg-red-50 rounded transition-colors">
            <span class="material-symbols-outlined text-lg">delete</span>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function searchFaculty() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allFaculty.filter(f =>
      (f.users?.full_name || '').toLowerCase().includes(q) ||
      (f.employee_code || '').toLowerCase().includes(q)
    );
    renderFaculty(filtered);
  }

  async function loadDepartments() {
    try {
      const res = await fetch(`${API_URL}/api/departments`, { headers });
      const depts = await res.json();
      const select = document.getElementById('f-department');
      depts.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.name;
        select.appendChild(opt);
      });
    } catch (err) {}
  }

  function openAddModal() {
    document.getElementById('add-modal').classList.remove('hidden');
    document.getElementById('add-modal').classList.add('flex');
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.add('hidden');
    document.getElementById('add-modal').classList.remove('flex');
    document.getElementById('modal-error').classList.add('hidden');
  }

  async function addFaculty() {
    const btn = document.getElementById('add-btn');
    const errorDiv = document.getElementById('modal-error');

    const body = {
      full_name: document.getElementById('f-name').value,
      email: document.getElementById('f-email').value,
      password: document.getElementById('f-password').value,
      employee_code: document.getElementById('f-code').value,
      phone: document.getElementById('f-phone').value,
      designation: document.getElementById('f-designation').value,
      department_id: document.getElementById('f-department').value,
      joining_date: document.getElementById('f-joining').value || undefined,
    };

    btn.disabled = true;
    btn.textContent = 'Adding...';
    errorDiv.classList.add('hidden');

    try {
      const res = await fetch(`${API_URL}/api/faculty`, {
        method: 'POST', headers, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(data.error));
      closeAddModal();
      loadFaculty();
    } catch (err) {
      errorDiv.textContent = 'Error: ' + err.message;
      errorDiv.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Faculty';
    }
  }

  async function deleteFaculty(id) {
    if (!confirm('Delete this faculty member?')) return;
    try {
      await fetch(`${API_URL}/api/faculty/${id}`, { method: 'DELETE', headers });
      loadFaculty();
    } catch (err) {
      alert('Failed to delete faculty');
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '../login_edumanage_erp/code.html';
  }

  loadFaculty();
  loadDepartments();
</script>
</body>
</html>
