<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduManage ERP - Enter Marks</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-bright": "#f9f9ff",
          "surface-container-low": "#f1f3ff",
          "surface-container": "#e9edff",
          "surface-container-lowest": "#ffffff",
          "outline-variant": "#c4c6cf",
          "outline": "#74777f",
          "on-surface-variant": "#43474e",
          "on-surface": "#141b2b",
          "primary": "#022448",
          "on-primary": "#ffffff",
          "primary-container": "#1e3a5f",
          "on-primary-container": "#8aa4cf",
          "on-primary-fixed-variant": "#2d486d",
          "secondary": "#0051d5",
          "error": "#ba1a1a"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { background-color: #f9f9ff; font-family: 'Inter', sans-serif; }
  .zebra-row:nth-child(even) { background-color: #EFF6FF; }
</style>
</head>
<body class="text-on-surface">

<aside class="flex flex-col h-screen fixed left-0 top-0 py-6 px-4 bg-primary w-64 z-50">
  <div class="mb-10 px-2">
    <h1 class="text-lg font-bold text-white">EduManage ERP</h1>
    <p class="text-xs text-on-primary-container opacity-70 uppercase tracking-widest mt-1">Faculty Portal</p>
  </div>
  <nav class="flex-1 space-y-1">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors" href="../mark_attendance_faculty_portal/code.html">
      <span class="material-symbols-outlined">calendar_today</span><span>Attendance</span>
    </a>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-container bg-primary-container rounded-lg font-bold" href="#">
      <span class="material-symbols-outlined">grade</span><span>Enter Marks</span>
    </a>
  </nav>
  <div class="mt-auto border-t border-white/10 pt-4">
    <div class="px-4 py-2">
      <p class="text-sm font-bold text-white" id="faculty-name">Loading...</p>
      <p class="text-xs text-on-primary-container opacity-70">Faculty</p>
    </div>
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary-fixed-variant hover:text-white hover:bg-primary-container/20 rounded-lg transition-colors cursor-pointer" onclick="logout()">
      <span class="material-symbols-outlined">logout</span><span>Logout</span>
    </a>
  </div>
</aside>

<main class="ml-64 min-h-screen">
  <header class="flex justify-between items-center w-full px-6 h-16 sticky top-0 bg-surface-bright border-b border-outline-variant z-40">
    <h2 class="text-xl font-bold text-primary">Enter Marks</h2>
  </header>

  <div class="p-6 max-w-[1280px]">

    <!-- Step 1: Create Exam -->
    <div class="bg-white border border-outline-variant rounded-xl p-6 mb-6">
      <h3 class="text-lg font-bold text-primary mb-4">Step 1 — Create Exam</h3>
      <div id="exam-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm"></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="exam-name" class="px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Exam Name (e.g. Mid Semester)" type="text"/>
        <input id="exam-subject" class="px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Subject ID (UUID)" type="text"/>
        <input id="exam-date" class="px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" type="date"/>
        <input id="exam-total" class="px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Total Marks (e.g. 100)" type="number"/>
        <input id="exam-semester" class="px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Semester (1-8)" type="number" min="1" max="8"/>
      </div>
      <button onclick="createExam()" id="create-exam-btn" class="mt-4 bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:opacity-90">
        Create Exam
      </button>
      <div id="exam-created" class="hidden mt-3 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg text-sm font-semibold"></div>
    </div>

    <!-- Step 2: Enter Marks -->
    <div class="bg-white border border-outline-variant rounded-xl p-6 mb-6">
      <h3 class="text-lg font-bold text-primary mb-4">Step 2 — Load Students & Enter Marks</h3>
      <div class="flex gap-4 mb-4">
        <input id="marks-semester" class="flex-1 px-4 py-2 border border-outline-variant rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20" placeholder="Semester to load students" type="number" min="1" max="8"/>
        <button onclick="loadStudentsForMarks()" class="bg-secondary text-white px-6 py-2 rounded-lg font-semibold hover:opacity-90">
          Load Students
        </button>
      </div>

      <div id="marks-section" class="hidden">
        <div class="bg-white rounded-xl border border-outline-variant overflow-hidden mb-4">
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="bg-primary text-white">
                <tr>
                  <th class="px-6 py-3 text-xs font-semibold uppercase">Roll No</th>
                  <th class="px-6 py-3 text-xs font-semibold uppercase">Student Name</th>
                  <th class="px-6 py-3 text-xs font-semibold uppercase text-right">Marks Obtained</th>
                </tr>
              </thead>
              <tbody id="marks-table"></tbody>
            </table>
          </div>
        </div>

        <button onclick="submitMarks()" id="submit-marks-btn" class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:opacity-90 flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">cloud_upload</span> Submit Marks
        </button>
      </div>
    </div>

    <div id="message-box" class="hidden p-4 rounded-lg text-sm font-semibold"></div>
  </div>
</main>

<script>
  const API_URL = 'https://student-erp-backend-v7f3.onrender.com';
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');

  const role = user?.roles?.name;

  if (!token || role !== 'faculty') {
    alert('Access denied. Faculty only.');
    window.location.href = '../login_edumanage_erp/code.html';
  }

  document.getElementById('faculty-name').textContent = user.full_name || 'Faculty';
  document.getElementById('exam-date').value = new Date().toISOString().split('T')[0];

  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

  let currentExamId = null;
  let students = [];

  async function createExam() {
    const btn = document.getElementById('create-exam-btn');
    const errorDiv = document.getElementById('exam-error');
    const successDiv = document.getElementById('exam-created');

    const body = {
      name: document.getElementById('exam-name').value,
      subject_id: document.getElementById('exam-subject').value,
      faculty_id: user.id,
      exam_date: document.getElementById('exam-date').value,
      total_marks: parseInt(document.getElementById('exam-total').value),
      semester: parseInt(document.getElementById('exam-semester').value),
    };

    btn.disabled = true;
    btn.textContent = 'Creating...';
    errorDiv.classList.add('hidden');
    successDiv.classList.add('hidden');

    try {
      const res = await fetch(`${API_URL}/api/marks/exams`, {
        method: 'POST', headers, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(JSON.stringify(data.error));

      currentExamId = data.id;
      successDiv.textContent = `✓ Exam "${data.name}" created! ID: ${data.id}`;
      successDiv.classList.remove('hidden');
    } catch (err) {
      errorDiv.textContent = 'Error: ' + err.message;
      errorDiv.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Exam';
    }
  }

  async function loadStudentsForMarks() {
    const semester = document.getElementById('marks-semester').value;
    if (!semester) { showMessage('Please enter a semester', 'error'); return; }

    try {
      const res = await fetch(`${API_URL}/api/students?semester=${semester}`, { headers });
      students = await res.json();

      if (!students.length) {
        showMessage('No students found for this semester', 'error');
        return;
      }

      document.getElementById('marks-section').classList.remove('hidden');

      const tbody = document.getElementById('marks-table');
      tbody.innerHTML = students.map((s, i) => `
        <tr class="zebra-row border-b border-outline-variant/30">
          <td class="px-6 py-3 font-mono text-on-surface-variant">${s.enrollment_number}</td>
          <td class="px-6 py-3 font-bold">${s.users?.full_name || 'N/A'}</td>
          <td class="px-6 py-3 text-right">
            <input type="number" min="0" class="marks-input w-24 px-3 py-1.5 border border-outline-variant rounded-lg text-right text-sm focus:outline-none focus:ring-2 focus:ring-secondary/20 font-bold" placeholder="0" data-student-id="${s.id}"/>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      showMessage('Failed to load students', 'error');
    }
  }

  async function submitMarks() {
    if (!currentExamId) {
      showMessage('Please create an exam first in Step 1', 'error');
      return;
    }

    const inputs = document.querySelectorAll('.marks-input');
    const marks = [...inputs].map(input => ({
      student_id: input.dataset.studentId,
      marks_obtained: parseFloat(input.value) || 0,
    }));

    const btn = document.getElementById('submit-marks-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Submitting...';

    try {
      const res = await fetch(`${API_URL}/api/marks/exams/${currentExamId}/marks`, {
        method: 'POST',
        headers,
        body: JSON.stringify({ marks })
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || 'Failed to submit');
      }

      showMessage('Marks submitted successfully!', 'success');
    } catch (err) {
      showMessage('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> Submit Marks';
    }
  }

  function showMessage(msg, type) {
    const box = document.getElementById('message-box');
    box.textContent = msg;
    box.className = `p-4 rounded-lg text-sm font-semibold ${
      type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
    }`;
    box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 5000);
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '../login_edumanage_erp/code.html';
  }
</script>
</body>
</html>
